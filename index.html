<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM At Home — Chat</title>
    <meta name="description" content="Chat interface for your local LLM via LM Studio">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><div class="logo-icon">⚡</div><span class="logo-text">LLM At Home</span></div>
                <button class="btn-icon" id="closeSidebar" title="Close">✕</button>
            </div>
            <button class="new-chat-btn" id="newChatBtn">＋ New Chat</button>
            <div class="chat-history" id="chatHistory"><div class="history-label">Recent</div></div>
            <div class="sidebar-footer">
                <button class="settings-btn" id="openSettings">⚙ Settings</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="btn-icon" id="toggleSidebar" title="Menu">☰</button>
                    <div class="model-badge" id="modelBadge"><span class="status-dot"></span><span id="modelName">Not Connected</span></div>
                </div>
                <button class="btn-icon" id="clearChat" title="Clear">🗑</button>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">⚡</div>
                    <h1 class="welcome-title">LLM At Home</h1>
                    <p class="welcome-subtitle">Your private AI, running locally</p>
                    <div class="quick-prompts">
                        <button class="quick-prompt" data-prompt="Explain quantum computing in simple terms"><span>🧪</span> Explain quantum computing</button>
                        <button class="quick-prompt" data-prompt="Write a Python merge sort function"><span>💻</span> Write a sorting algorithm</button>
                        <button class="quick-prompt" data-prompt="What are REST API best practices?"><span>🚀</span> REST API best practices</button>
                        <button class="quick-prompt" data-prompt="Brainstorm a creative project idea"><span>💡</span> Brainstorm ideas</button>
                    </div>
                </div>
                <div id="messagesArea"></div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Send a message..." rows="1" autofocus></textarea>
                    <button class="send-btn" id="sendBtn" disabled title="Send">▶</button>
                    <button class="stop-btn hidden" id="stopBtn" title="Stop">■</button>
                </div>
                <p class="input-disclaimer">Runs locally — your data stays private.</p>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay hidden" id="settingsModal">
        <div class="modal">
            <div class="modal-header"><h2>Settings</h2><button class="btn-icon" id="closeSettings">✕</button></div>
            <div class="modal-body">
                <div class="settings-group">
                    <h3>Connection</h3>
                    <div class="form-field">
                        <label for="apiUrl">API Base URL</label>
                        <input type="url" id="apiUrl" placeholder="https://your-tunnel.trycloudflare.com">
                        <span class="form-hint">Cloudflare tunnel URL or http://localhost:1234</span>
                    </div>
                    <div class="form-field">
                        <label for="apiKey">API Key <small>(optional)</small></label>
                        <input type="password" id="apiKey" placeholder="lm-studio">
                        <span class="form-hint">Usually not required for LM Studio</span>
                    </div>
                    <button class="test-btn" id="testConnection">✓ Test Connection</button>
                    <div class="connection-status hidden" id="connectionStatus"></div>
                </div>
                <div class="settings-group">
                    <h3>Model</h3>
                    <div class="form-field">
                        <label for="modelSelect">Select Model</label>
                        <select id="modelSelect"><option value="">Connect first to load models</option></select>
                    </div>
                </div>
                <div class="settings-group">
                    <h3>Parameters</h3>
                    <div class="form-field">
                        <label for="temperature">Temperature: <span id="tempValue">0.7</span></label>
                        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                    </div>
                    <div class="form-field">
                        <label for="maxTokens">Max Tokens</label>
                        <input type="number" id="maxTokens" value="2048" min="64" max="32768">
                    </div>
                    <div class="form-field">
                        <label for="systemPrompt">System Prompt</label>
                        <textarea id="systemPrompt" rows="3">You are a helpful, friendly AI assistant.</textarea>
                    </div>
                    <div class="form-field toggle-field">
                        <label>Stream responses</label>
                        <label class="toggle"><input type="checkbox" id="streamToggle" checked><span class="toggle-slider"></span></label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="resetSettings">Reset</button>
                <button class="btn-primary" id="saveSettings">Save</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
